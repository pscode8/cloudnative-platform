# ── ingress-nginx Installation ───────────────────────────────────
# ingress-nginx is a Kubernetes Ingress controller.
# It runs nginx inside the cluster and creates an AWS NLB.
# All Ingress resources in the cluster are handled by this controller.
#
# Install command (run once when cluster is created):
# helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx #   --namespace ingress-nginx #   --create-namespace #   -f k8s/cluster-addons/ingress-nginx.yaml
 
controller:
  # AWS NLB (Network Load Balancer) — handles millions of requests/sec
  # NLB vs ALB: NLB is L4 (faster), ALB is L7 (more features)
  # nginx handles L7 routing INSIDE the cluster — best of both worlds
  service:
    type: LoadBalancer
    annotations:
      service.beta.kubernetes.io/aws-load-balancer-type: nlb
      service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
 
  # Run 2 replicas of nginx controller — HA
  replicaCount: 2
 
  # Metrics for Prometheus (Phase 5)
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
 
  # Resource limits for the controller itself
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
 
  # Config for nginx itself
  config:
    # Enable real IP passthrough — logs show client IP not NLB IP
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    # Security headers on all responses
    add-headers: ingress-nginx/custom-headers
    # Rate limiting defaults
    limit-req-status-code: "429"
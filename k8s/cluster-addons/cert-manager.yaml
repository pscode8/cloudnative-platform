# ── cert-manager ClusterIssuer ───────────────────────────────────
# cert-manager watches Ingress resources for cert-manager annotations.
# When found: talks to Let's Encrypt, proves domain ownership,
# gets certificate, stores in k8s Secret, renews before expiry.
#
# Install cert-manager first:
# helm upgrade --install cert-manager jetstack/cert-manager #   --namespace cert-manager #   --create-namespace #   --set installCRDs=true
#
# Then apply this file:
# kubectl apply -f k8s/cluster-addons/cert-manager.yaml
#
# How ACME/Let's Encrypt works:
# 1. cert-manager requests cert for api.cloudnative.dev
# 2. Let's Encrypt says: prove you own this domain
# 3. cert-manager creates a temporary DNS record or HTTP endpoint
# 4. Let's Encrypt verifies → issues 90-day certificate
# 5. cert-manager stores cert in k8s Secret
# 6. cert-manager renews automatically at 60 days

---
# Production issuer — real certificates, rate limited (5/week per domain)
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: devops@cloudnative.dev # Renewal notifications sent here
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx

---
# Staging issuer — for testing, no rate limits, cert not trusted by browsers
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: devops@cloudnative.dev
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx

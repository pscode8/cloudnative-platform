---
# ── Master Playbook ───────────────────────────────────────────────
# Applies all roles to all server groups.
#
# Usage:
#   ansible-playbook -i inventory/dev.ini playbooks/site.yml
#   ansible-playbook -i inventory/prod.ini playbooks/site.yml --check (dry run)
#
# The --check flag does a dry run — shows what WOULD change without changing it.
# Always run --check on prod before actual apply. Same philosophy as terraform plan.

- name: Apply common hardening to all servers
  hosts: all
  become: true # sudo
  gather_facts: true

  roles:
    - role: common # OS hardening, SSH, firewall, fail2ban
    - role: monitoring-agent # Node exporter for Prometheus (Phase 5)

- name: Configure Docker hosts
  hosts: docker_hosts
  become: true

  roles:
    - role: docker # Install Docker + Compose, add users to docker group

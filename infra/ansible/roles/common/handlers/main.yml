---
# ── Handlers ─────────────────────────────────────────────────────
# Handlers only run when notified by a task.
# If sshd_config changes 3 times in one play, SSH restarts ONCE at end.
# This prevents service flapping during long playbook runs.

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: restart fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: restarted

- name: reload ufw
  ansible.builtin.command: ufw reload
  changed_when: false

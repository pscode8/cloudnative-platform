---
# ── Common OS Hardening Role ──────────────────────────────────────
# Applied to ALL servers: EKS nodes, bastion, monitoring instances.
#
# Philosophy: Defense in depth. Assume your network will be breached.
# A hardened OS is the last line of defense.
#
# Based on: CIS Ubuntu Benchmark Level 1
# Reference: https://www.cisecurity.org/benchmark/ubuntu_linux

# ── Package Updates ───────────────────────────────────────────────
- name: Update all packages to latest
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
    cache_valid_time: 3600
  tags: packages

- name: Install security essentials
  ansible.builtin.apt:
    name:
      - fail2ban          # Bans IPs with too many failed SSH attempts
      - ufw               # Uncomplicated Firewall
      - unattended-upgrades  # Auto-installs security patches
      - auditd            # Logs security-relevant system calls
      - aide              # File integrity monitoring (detects rootkits)
      - curl
      - htop
      - vim
    state: present
  tags: packages

# ── SSH Hardening ─────────────────────────────────────────────────
# SSH is the most attacked service. Harden it.
# Shodan finds your SSH port in minutes. Make brute force impossible.
- name: Harden SSH configuration
  ansible.builtin.template:
    src: sshd_config.j2
    dest: /etc/ssh/sshd_config
    owner: root
    group: root
    mode: "0600"
    validate: /usr/sbin/sshd -t -f %s  # Validate before applying
  notify: restart sshd
  tags: ssh

# ── Firewall ──────────────────────────────────────────────────────
- name: Enable UFW and set default deny
  community.general.ufw:
    state: enabled
    policy: deny  # Default: block everything, then allow specific ports
  tags: firewall

- name: Allow SSH (rate-limited — max 6 attempts per 30 seconds)
  community.general.ufw:
    rule: limit
    port: "22"
    proto: tcp
  tags: firewall

- name: Allow HTTP and HTTPS
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "80"
    - "443"
  tags: firewall

# ── Fail2ban ──────────────────────────────────────────────────────
# Monitors /var/log/auth.log. After 5 failed SSH attempts
# from same IP → bans that IP for 1 hour via iptables.
# Stops brute force attacks cold.
- name: Configure fail2ban
  ansible.builtin.template:
    src: fail2ban-jail.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: "0644"
  notify: restart fail2ban
  tags: fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started
  tags: fail2ban

# ── Kernel Hardening (sysctl) ─────────────────────────────────────
# Low-level OS security settings.
# Prevents: IP spoofing, SYN flood attacks, source routing exploits.
- name: Apply kernel security parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    # Prevent IP spoofing
    - { name: "net.ipv4.conf.all.rp_filter", value: "1" }
    - { name: "net.ipv4.conf.default.rp_filter", value: "1" }
    # Ignore ICMP broadcast (smurf attacks)
    - { name: "net.ipv4.icmp_echo_ignore_broadcasts", value: "1" }
    # Disable source packet routing
    - { name: "net.ipv4.conf.all.accept_source_route", value: "0" }
    # SYN flood protection
    - { name: "net.ipv4.tcp_syncookies", value: "1" }
    # Disable IPv6 if not needed (reduces attack surface)
    - { name: "net.ipv6.conf.all.disable_ipv6", value: "1" }
  tags: kernel

# ── Unattended Security Upgrades ─────────────────────────────────
# Automatically installs security patches without manual intervention.
# Equifax breach (2017, $700M fine) was caused by an unpatched
# Apache Struts vulnerability that had a patch available for 2 months.
- name: Enable unattended security upgrades
  ansible.builtin.template:
    src: unattended-upgrades.j2
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    owner: root
    group: root
    mode: "0644"
  tags: updates

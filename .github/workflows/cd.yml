# ── Continuous Deployment Pipeline ──────────────────────────────
# Triggered on merge to main branch.
# Flow:
#   1. Build Docker image
#   2. Push to ECR with SHA tag (immutable, traceable)
#   3. Run Trivy security scan
#   4. Update GitOps repo with new image tag
#   5. ArgoCD detects git change → auto deploys to dev
#
# WHY SHA tags not version tags for CD?
# sha-abc123f is immutable — you know EXACTLY what code is running.
# v1.2.3 could be overwritten. SHA cannot. Production-grade traceability.
name: CD

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/frontend/**"
      - "apps/worker/**"

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-2.amazonaws.com
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  build-push:
    name: Build and Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image-tag: ${{ env.IMAGE_TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build API image
        run: |
          docker build \
            --target prod \
            --tag $ECR_REGISTRY/cloudnative/api:$IMAGE_TAG \
            --tag $ECR_REGISTRY/cloudnative/api:latest \
            --cache-from $ECR_REGISTRY/cloudnative/api:latest \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            apps/api/

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REGISTRY }}/cloudnative/api:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL
          exit-code: 1

      - name: Upload security scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Push to ECR
        run: |
          docker push $ECR_REGISTRY/cloudnative/api:$IMAGE_TAG
          docker push $ECR_REGISTRY/cloudnative/api:latest

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build-push
    environment: dev
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update image tag in GitOps (Dev)
        run: |
          sed -i "s|value: .*|value: \"${{ needs.build-push.outputs.image-tag }}\"|" gitops/environments/dev/api.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/dev/api.yaml
          git commit -m "chore(gitops): deploy api ${{ needs.build-push.outputs.image-tag }} to dev"
          git push

      - name: Notify Slack (Dev)
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ Deployed *cloudnative-api* `${{ needs.build-push.outputs.image-tag }}` to *dev*"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy-dev
    environment: staging
    permissions:
      contents: write

    steps:
      # We must pull the latest commit made by the deploy-dev job to avoid git conflicts
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tag in GitOps (Staging)
        run: |
          sed -i "s|value: .*|value: \"${{ needs.build-push.outputs.image-tag }}\"|" gitops/environments/staging/api.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/staging/api.yaml
          git commit -m "chore(gitops): deploy api ${{ needs.build-push.outputs.image-tag }} to staging"
          git push

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: prod
    permissions:
      contents: write

    steps:
      # Pull latest commit made by staging
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main

      - name: Update image tag in GitOps (Prod)
        run: |
          sed -i "s|value: .*|value: \"${{ needs.build-push.outputs.image-tag }}\"|" gitops/environments/prod/api.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/prod/api.yaml
          git commit -m "chore(gitops): deploy api ${{ needs.build-push.outputs.image-tag }} to prod"
          git push

      - name: Notify Slack (Prod)
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 PRODUCTION DEPLOYMENT: *cloudnative-api* `${{ needs.build-push.outputs.image-tag }}` is live!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

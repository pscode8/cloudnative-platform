# ── Promote to Production ────────────────────────────────────────
# Production deployments require:
# 1. Manual trigger with image tag
# 2. Required reviewers approval (set in GitHub Environments settings)
# 3. Staging must have had that tag deployed first
#
# This is the 'four eyes principle' — two humans verify before prod change.
# Aviation, nuclear, and finance all use this. So do we.

name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote to prod (must be deployed to staging first)"
        required: true
        type: string
      change_ticket:
        description: "Change ticket number (e.g. CHG-1234)"
        required: true
        type: string

jobs:
  promote-prod:
    name: Deploy ${{ github.event.inputs.image_tag }} to Production
    runs-on: ubuntu-latest
    environment:
      production # REQUIRES APPROVAL from required reviewers
      # Set in: Settings → Environments → production → Required reviewers

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update production GitOps
        run: |
          sed -i "s|value: .*|value: \"${{ github.event.inputs.image_tag }}\"|"             gitops/environments/prod/api.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/environments/prod/api.yaml
          git commit -m "chore(gitops): deploy api ${{ github.event.inputs.image_tag }} to production

          Change ticket: ${{ github.event.inputs.change_ticket }}
          Approved by: ${{ github.actor }}"
          git push

      # Create GitHub Release for every prod deployment
      # Full audit trail: what, when, who approved
      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ github.event.inputs.image_tag }}',
              name: 'Production deploy: ${{ github.event.inputs.image_tag }}',
              body: [
                '## Production Deployment',
                '**Image tag:** `${{ github.event.inputs.image_tag }}`',
                '**Change ticket:** ${{ github.event.inputs.change_ticket }}',
                '**Deployed by:** ${{ github.actor }}',
                '**Time:** ' + new Date().toISOString(),
              ].join('\n'),
              prerelease: false,
            });

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🎯 *PRODUCTION DEPLOY* cloudnative-api `${{ github.event.inputs.image_tag }}` deployed by ${{ github.actor }} | Ticket: ${{ github.event.inputs.change_ticket }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

# ── Semantic Release ─────────────────────────────────────────────
# Analyzes conventional commits to auto-bump version and changelog.
#
# Commit types → version bump:
#   feat: new feature      → minor bump (1.0.0 → 1.1.0)
#   fix: bug fix           → patch bump (1.0.0 → 1.0.1)
#   BREAKING CHANGE        → major bump (1.0.0 → 2.0.0)
#   chore/docs/refactor    → no bump
#
# Output:
#   - New git tag (v1.2.3)
#   - GitHub Release with auto-generated changelog
#   - CHANGELOG.md updated in repo
#
# This replaces manual versioning completely.
# Every merge to main either bumps version or not — automatic.

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history needed for changelog generation
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install semantic-release
        run: |
          npm install -g             semantic-release             @semantic-release/changelog             @semantic-release/git             @semantic-release/github             @semantic-release/commit-analyzer             @semantic-release/release-notes-generator

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release

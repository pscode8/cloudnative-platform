name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: pip install pre-commit
      - run: pre-commit run --all-files

  test-api:
    name: Test API
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        working-directory: apps/api
        run: pip install -e ".[dev]" aiosqlite
      - name: Run tests
        working-directory: apps/api
        env:
          ENV: dev
          DATABASE_URL: sqlite+aiosqlite:///./test.db
          REDIS_URL: redis://localhost:6379/0
          KAFKA_BOOTSTRAP_SERVERS: localhost:9092
          OTEL_EXPORTER_OTLP_ENDPOINT: http://localhost:4317
        run: pytest tests/ -v --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: apps/api/coverage.xml
          fail_ci_if_error: false

  build-scan:
    name: Build and Scan
    runs-on: ubuntu-latest
    needs: test-api
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t cloudnative/api:ci --target prod ./apps/api
      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: cloudnative/api:ci
          format: table
          severity: CRITICAL, HIGH
          exit-code: 1
          trivyignores: apps/api/.trivyignore
      - name: Push to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag cloudnative/api:ci ghcr.io/${{ github.repository_owner }}/cloudnative-api:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/cloudnative-api:${{ github.sha }}

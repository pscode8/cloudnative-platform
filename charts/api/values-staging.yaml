# ── Staging Environment Values ───────────────────────────────────
# Staging should be as close to prod as possible.
# The closer staging is to prod, the more reliable your pre-prod testing.
# Common mistake: staging with lower resources → works in staging, OOMs in prod.
 
replicaCount: 2
 
image:
  repository: "483518901689.dkr.ecr.us-east-2.amazonaws.com/cloudnative/api"
  tag: "latest"
 
ingress:
  hosts:
    - host: api.staging.cloudnative.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-staging-tls
      hosts:
        - api.staging.cloudnative.dev
 
# Same resource limits as prod — test with real constraints
resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi
 
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
 
env:
  ENV: "staging"
  LOG_LEVEL: "INFO"
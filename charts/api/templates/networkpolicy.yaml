# ── Network Policy ───────────────────────────────────────────────
# By default Kubernetes allows ALL pods to talk to ALL pods.
# This is a massive security risk — a compromised pod can reach everything.
#
# NetworkPolicy = firewall rules for pod-to-pod traffic.
# This policy: API pods ONLY accept traffic from ingress-nginx.
# Nothing else can reach the API directly — not even other pods.
#
# Zero-trust networking: default deny, explicit allow.
# Same principle as AWS security groups but for k8s.

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: { { include "cloudnative-api.fullname" . } }
  labels: { { - include "cloudnative-api.labels" . | nindent 4 } }
spec:
  podSelector:
    matchLabels:
      { { - include "cloudnative-api.selectorLabels" . | nindent 6 } }

  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow traffic from ingress-nginx controller only
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000

  egress:
    # Allow DNS resolution — pods need this for service discovery
    - ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow outbound to postgres (5432) and redis (6379)
    - ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
    # Allow outbound HTTPS for AWS API calls (Secrets Manager, S3)
    - ports:
        - protocol: TCP
          port: 443

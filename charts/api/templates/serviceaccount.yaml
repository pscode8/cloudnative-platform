# ── Service Account ──────────────────────────────────────────────
# Every pod should have its own ServiceAccount — not use 'default'.
# With IRSA: this SA is linked to an IAM role via annotation.
# Pod presents a signed JWT token → AWS STS verifies → grants IAM role.
# Tokens auto-rotate every 24 hours. No credentials stored anywhere.
#
# This is Zero Trust for AWS API access:
# "Never trust, always verify" — every pod proves its identity.

{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cloudnative-api.serviceAccountName" . }}
  labels:
    {{- include "cloudnative-api.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
    # Add IRSA annotation in values.yaml:
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/cloudnative-api-role
  {{- end }}
automountServiceAccountToken: true
{{- end }}

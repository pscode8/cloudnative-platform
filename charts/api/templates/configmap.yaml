# ── ConfigMap ─────────────────────────────────────────────────────
# Stores non-sensitive configuration as key-value pairs.
# Injected into pods as environment variables via envFrom.
#
# RULE: ConfigMap = non-sensitive config (URLs, feature flags, log levels)
#       Secret / ExternalSecret = sensitive (passwords, API keys, tokens)
# Violating this rule = credentials in git history = breach.
 
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cloudnative-api.fullname" . }}-config
  labels:
    {{- include "cloudnative-api.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
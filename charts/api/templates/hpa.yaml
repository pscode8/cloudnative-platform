# ── Horizontal Pod Autoscaler ────────────────────────────────────
# HPA watches metrics and adjusts replica count automatically.
# Scale up: CPU > 70% for 30s → add pods (fast response)
# Scale down: CPU < 70% for 5min → remove pods (slow, prevents flapping)
#
# Requires: metrics-server installed in cluster (we install below)
# Advanced: In Phase 3 we also add KEDA for Kafka-based scaling

{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "cloudnative-api.fullname" . }}
  labels:
    {{- include "cloudnative-api.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "cloudnative-api.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # Scale up quickly on traffic spike
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60  # Add max 2 pods per minute
    scaleDown:
      stabilizationWindowSeconds: 300  # Wait 5min before scaling down
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60  # Remove max 1 pod per minute
{{- end }}

# ── ArgoCD Application: API (Staging) ────────────────────────────
# Staging mirrors production config as closely as possible.
# Purpose: catch environment-specific bugs before they hit prod.
# Same image, same resource limits, same DB size as prod (ideally).
# Only difference: less traffic, non-production data.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-api-staging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloudnative

  source:
    repoURL: https://github.com/pscode8/cloudnative-platform
    targetRevision: main
    path: charts/api
    helm:
      valueFiles:
        - values.yaml
        - values-staging.yaml
      parameters:
        - name: image.tag
          value: "latest"   # CD pipeline updates this

  destination:
    server: https://kubernetes.default.svc
    namespace: cloudnative-staging

  # Staging: manual sync — human reviews before applying
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

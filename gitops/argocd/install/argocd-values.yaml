# ── ArgoCD Installation Values ───────────────────────────────────
# ArgoCD is the GitOps engine — watches git, applies to k8s.
# GitOps principle: git is the SINGLE SOURCE OF TRUTH.
# No kubectl apply manually. Every change goes through git + PR.
# Audit trail: every deployment is a git commit with author + timestamp.
#
# Install: helm install argocd argo/argo-cd -n argocd -f this-file.yaml

server:
  # Expose ArgoCD UI via ingress
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
      nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    hosts:
      - argocd.cloudnative.dev
    tls:
      - secretName: argocd-tls
        hosts:
          - argocd.cloudnative.dev

  # Metrics for Prometheus scraping (Phase 5)
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

configs:
  params:
    # Disable TLS on server — nginx handles TLS termination
    server.insecure: true

  # RBAC — who can do what in ArgoCD
  rbac:
    policy.default: role:readonly # Default: everyone can view
    policy.csv: |
      # Admins can sync and manage apps
      p, role:admin, applications, *, */*, allow
      p, role:admin, clusters, *, *, allow
      g, devops-team, role:admin

repoServer:
  metrics:
    enabled: true

applicationSet:
  metrics:
    enabled: true

---
# 1. The Deployment (The compute)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: cloudnative-dev
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          # Pulling directly from your provisioned AWS ECR
          image: 483518901689.dkr.ecr.us-east-2.amazonaws.com/cloudnative/api:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
# 2. The Service (The internal network load balancer)
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: cloudnative-dev
spec:
  selector:
    app: api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080

---
# 3. The Ingress (The public front door + SSL Certificate)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: cloudnative-dev
  annotations:
    # This tells cert-manager to automatically fetch an SSL cert!
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.yourdomain.com # <-- Update this when you have a real domain
      secretName: api-tls-secret
  rules:
    - host: api.yourdomain.com # <-- Update this
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 80

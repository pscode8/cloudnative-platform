# Install command:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace \
#   -f observability/k8s/monitoring-stack.yaml

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "45GB"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi
    # Scrape your API automatically
    additionalScrapeConfigs:
      - job_name: cloudnative-api
        static_configs:
          - targets: ['cloudnative-api.cloudnative-dev.svc.cluster.local:8000']
        metrics_path: /metrics

      - job_name: cloudnative-worker
        static_configs:
          - targets: ['cloudnative-worker.cloudnative-dev.svc.cluster.local:8001']

grafana:
  enabled: true
  adminPassword: "changeme-store-in-vault"
  persistence:
    enabled: true
    size: 10Gi
  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-prod
    hosts:
      - grafana.cloudnative.dev
    tls:
      - secretName: grafana-tls
        hosts: [grafana.cloudnative.dev]
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cloudnative
          orgId: 1
          folder: CloudNative
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/cloudnative
  dashboardsConfigMaps:
    cloudnative: grafana-dashboards
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard

alertmanager:
  config:
    global:
      slack_api_url: "YOUR_SLACK_WEBHOOK_URL"
      resolve_timeout: 5m
    route:
      receiver: slack-critical
      group_by: [alertname, cluster, service]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            severity: critical
          receiver: slack-critical
          continue: true
        - match:
            severity: warning
          receiver: slack-warning
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: '#alerts-critical'
            send_resolved: true
            title: '{{ if eq .Status "firing" }}🚨{{ else }}✅{{ end }} {{ .CommonAnnotations.summary }}'
            text: |
              *Description:* {{ .CommonAnnotations.description }}
              *Severity:* {{ .CommonLabels.severity }}
              *Runbook:* {{ .CommonAnnotations.runbook }}
      - name: slack-warning
        slack_configs:
          - channel: '#alerts-warning'
            send_resolved: true
            title: '⚠️ {{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname, cluster, service]

loki:
  enabled: true
  persistence:
    enabled: true
    size: 20Gi

tempo:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi

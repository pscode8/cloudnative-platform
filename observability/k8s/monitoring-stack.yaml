# Install:
# helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
# helm upgrade --install monitoring prometheus-community/kube-prometheus-stack \
#   --namespace monitoring --create-namespace \
#   -f observability/k8s/monitoring-stack.yaml
prometheus:
  prometheusSpec:
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi
    additionalScrapeConfigs:
      - job_name: cloudnative-api
        static_configs:
          - targets: ['cloudnative-api.cloudnative-dev:8000']
grafana:
  enabled: true
  adminPassword: "changeme-use-vault-in-prod"
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts: [grafana.cloudnative.dev]
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: cloudnative
          folder: CloudNative
          type: file
          options: { path: /var/lib/grafana/dashboards }
alertmanager:
  config:
    global:
      slack_api_url: "YOUR_SLACK_WEBHOOK"
    route:
      receiver: slack-critical
      group_wait: 30s
      repeat_interval: 4h
      routes:
        - match: { severity: critical }
          receiver: slack-critical
        - match: { severity: warning }
          receiver: slack-warning
    receivers:
      - name: slack-critical
        slack_configs:
          - channel: '#alerts-critical'
            title: 'CRITICAL: {{ .CommonAnnotations.summary }}'
            text: '{{ .CommonAnnotations.description }}'
      - name: slack-warning
        slack_configs:
          - channel: '#alerts-warning'
            title: 'WARNING: {{ .CommonAnnotations.summary }}'
loki:
  enabled: true
tempo:
  enabled: true